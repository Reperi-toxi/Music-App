<!DOCTYPE html>
<html lang = "en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        background:#111;
        display:flex;
        flex-wrap:wrap;
        gap:12px;
        padding:20px;
        justify-content:center;
      }

      h1 {
        width:100%;
        text-align:center;
        color:#fff;
        font-family:sans-serif;
        font-size:1rem;
        font-weight:normal;
        margin:0 0 8px;
      }

      a {
        display:flex;
        align-items:center;
        justify-content:center;
        width:120px;
        height:80px;
        background:#222;
        color:#fff;
        font-size:1.1rem;
        font-family:sans-serif;
        text-decoration:none;
        border-radius:12px;
        border:1px solid #444;
      }

      a:active {
        background:#444;
      }
    </style>
    <title></title>
</head>

<body>

      <h1 id="title">{{song_name}}</h1>

      <a onclick="cmd('/play')">▶ / ⏸</a>
      <a onclick="cmd('/stop')">⏹ Stop</a>
      <a onclick="cmd('/prev')">⏮ Prev</a>
      <a onclick="cmd('/next')">⏭ Next</a>
      <a onclick="cmd('/back')">-5s</a>
      <a onclick="cmd('/fwd')">+5s</a>

    <script>
      async function cmd(action) {
        await fetch(action);

        setTimeout(async () => {
          const r = await fetch('/song');
          const d = await r.json();
          document.getElementById('title').textContent = d.name;
        }, 300);
      }
    </script>

</body>
</html>
